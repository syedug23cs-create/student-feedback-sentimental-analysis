<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — FeedBack Pro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-content">
                <span class="auth-logo"><i class="fas fa-pen-fancy"></i></span>
                <h2 class="auth-title">Join Us Today!</h2>
                <p class="auth-subtitle">
                    Create an account and start sharing your valuable feedback to improve education quality.
                </p>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-form-container">
                <div class="auth-form-header">
                    <h2>Create Account</h2>
                    <p>Get started in 2 minutes</p>
                </div>

                <form id="signup-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName"><i class="fas fa-user"></i> Full Name</label>
                            <input type="text" id="fullName" name="fullName" placeholder="Your full name" required>
                            <div class="form-error" id="fullName-error"></div>
                        </div>
                        <div class="form-group">
                            <label for="studentId"><i class="fas fa-id-card"></i> Student ID</label>
                            <input type="text" id="studentId" name="studentId" placeholder="e.g. S12345" required>
                            <div class="form-error" id="studentId-error"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="department"><i class="fas fa-building"></i> Department</label>
                            <select id="department" name="department" required>
                                <option value="">Select Department</option>
                                <option>Computer Science</option>
                                <option>Electronics</option>
                                <option>Mechanical</option>
                                <option>Civil</option>
                                <option>Electrical</option>
                                <option>Information Technology</option>
                                <option>Other</option>
                            </select>
                            <div class="form-error" id="department-error"></div>
                        </div>
                        <div class="form-group">
                            <label for="year"><i class="fas fa-calendar"></i> Year</label>
                            <select id="year" name="year" required>
                                <option value="">Select Year</option>
                                <option>1st Year</option>
                                <option>2nd Year</option>
                                <option>3rd Year</option>
                                <option>4th Year</option>
                            </select>
                            <div class="form-error" id="year-error"></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        <div class="form-error" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="password" placeholder="Min 6 characters" required>
                        <div class="form-error" id="password-error"></div>
                        <div class="password-strength">
                            <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                            <div class="strength-text"><span id="strength-text">Strength: —</span></div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required>
                        <div class="form-error" id="confirmPassword-error"></div>
                    </div>

                    <div style="margin-bottom:1.25rem;">
                        <label style="display:flex;align-items:flex-start;gap:.75rem;cursor:pointer;font-size:.88rem;">
                            <input type="checkbox" id="terms" name="terms" required style="margin-top:.2rem;">
                            <span>I agree to the Terms of Service and Privacy Policy</span>
                        </label>
                        <div class="form-error" id="terms-error"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>
                </form>

                <div class="auth-form-link">
                    Already have an account? <a href="login.html">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="../js/pages/signup.js"></script>
</body>
</html>
