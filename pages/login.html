<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — FeedBack Pro</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <!-- Left Panel -->
        <div class="auth-left">
            <div class="auth-content">
                <span class="auth-logo"><i class="fas fa-graduation-cap"></i></span>
                <h2 class="auth-title">Welcome Back!</h2>
                <p class="auth-subtitle">
                    Join thousands of students helping shape the future of education through honest feedback.
                </p>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="auth-right">
            <div class="auth-form-container">
                <div class="auth-form-header">
                    <h2>Sign In</h2>
                    <p>Enter your credentials to continue</p>
                </div>

                <form id="login-form">
                    <div class="form-group">
                        <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required>
                        <div class="form-error" id="email-error"></div>
                    </div>

                    <div class="form-group">
                        <label for="password"><i class="fas fa-lock"></i> Password</label>
                        <input type="password" id="password" name="password" placeholder="Your password" required>
                        <div class="form-error" id="password-error"></div>
                    </div>

                    <div class="flex-between" style="margin-bottom:1.25rem;font-size:.88rem;">
                        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin:0;">
                            <input type="checkbox" id="remember-me"> Remember me
                        </label>
                        <a href="forgot-password.html" style="color:var(--primary);font-weight:600;text-decoration:none;">Forgot password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">
                        <i class="fas fa-arrow-right"></i> Login
                    </button>
                </form>

                <div class="auth-form-link">
                    Don't have an account? <a href="signup.html">Sign up here</a>
                </div>

                <div class="quote-section" style="margin-top:1.75rem;font-size:.88rem;">
                    "Your feedback shapes the future of education"
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>
    <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
